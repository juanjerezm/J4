project: MAIN
var: ElectricityProduction
scale: !!float 1e-3 # GWh/MWh, float flag needed

plot:
  name: "ElectricityProductionChange"
  save: true
  show: true
  # width: 8.5
  height: 9
  autoscale: false

  y1:
    min: -8
    max: 0
    pad: 0
    major_ticks: {start: -8, stop: 0, step: 2}
    minor_ticks: {start: -8, stop: 0, step: 1}
    major_grid: true
    minor_grid: false
    label: "Change in electricity cogeneration\n(GWh/year)"
    label_kwargs: {fontweight: "bold"}
    ticklabel_format: "{:.0f}"
