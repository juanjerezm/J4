project: MAIN
var: HeatProduction
scale: !!float 1e-3 # GWh/MWh, float flag needed

plot:
  name: "Reference_HeatProductionTimeseries"
  save: true
  show: true
  # width: 8.5
  height: 15
  autoscale: false

  y1:
    min: 0
    max: 50
    pad: 0
    major_ticks: {start: 0, stop: 50, step: 10}
    minor_ticks: {start: 0, stop: 50, step: 5}
    major_grid: true
    minor_grid: false
    label: "DH production\n(GWh/h)"
    label_kwargs: {fontweight: "bold"}
    ticklabel_format: "{:.0f}"
